spring:
  application:
    name: todo
  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PW}
  config:
    import: optional:file:.env[.properties]
  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: llama3 # 또는 gemma, mistral 등 설치한 모델명
          temperature: 0.7 # 창의성 조절 (0.0 ~ 1.0)